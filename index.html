<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSON • WhatsApp Bug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 50, 50, 0.06) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(255, 50, 50, 0.04) 0%, transparent 60%);
            overflow: hidden;
        }

        /* === ANIMASI PARTIKEL === */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 80, 80, 0.3);
            border-radius: 50%;
            animation: floatParticle 12s infinite linear;
        }
        .particle:nth-child(1) { left: 10%; animation-duration: 14s; width: 6px; height: 6px; }
        .particle:nth-child(2) { left: 25%; animation-duration: 18s; opacity: 0.5; }
        .particle:nth-child(3) { left: 40%; animation-duration: 11s; width: 8px; height: 8px; }
        .particle:nth-child(4) { left: 55%; animation-duration: 16s; opacity: 0.4; }
        .particle:nth-child(5) { left: 70%; animation-duration: 13s; width: 5px; height: 5px; }
        .particle:nth-child(6) { left: 85%; animation-duration: 19s; opacity: 0.6; }
        .particle:nth-child(7) { left: 15%; animation-duration: 20s; width: 7px; height: 7px; top: 20%; }
        .particle:nth-child(8) { left: 50%; animation-duration: 15s; width: 4px; height: 4px; top: 30%; }
        .particle:nth-child(9) { left: 75%; animation-duration: 17s; width: 6px; height: 6px; top: 10%; }
        .particle:nth-child(10) { left: 35%; animation-duration: 22s; opacity: 0.3; top: 40%; }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* === CONTAINER === */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(14, 18, 30, 0.9);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 36px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255, 80, 80, 0.12);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.03);
            transition: 0.3s;
        }

        /* === HEADER === */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .icon-bug {
            font-size: 48px;
            background: rgba(255, 50, 50, 0.08);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            border: 1px solid rgba(255, 50, 50, 0.15);
            animation: pulseRed 2.5s ease-in-out infinite;
        }
        @keyframes pulseRed {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 50, 50, 0); }
            50% { transform: scale(1.06); box-shadow: 0 0 50px rgba(255, 50, 50, 0.12); }
        }
        .header h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 50, 50, 0.15);
        }
        .header .sub {
            color: #7a8aa8;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 3px;
            margin-top: 4px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* === FORM === */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #9aabca;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            color: #e0e8f0;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
        }
        .form-group input:focus {
            border-color: #ff4444;
            background: rgba(255, 50, 50, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 50, 50, 0.06);
        }
        .form-group input::placeholder {
            color: #4a5a7a;
        }

        /* === MODE === */
        .mode-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 16px 0 14px;
        }
        .mode-btn {
            flex: 1;
            min-width: 70px;
            padding: 10px 8px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
            color: #7a8aa8;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .mode-btn:hover {
            background: rgba(255, 50, 50, 0.08);
            border-color: rgba(255, 50, 50, 0.15);
            color: #fff;
        }
        .mode-btn.active {
            background: #cc0000;
            color: #fff;
            border-color: #cc0000;
            box-shadow: 0 4px 20px rgba(255, 50, 50, 0.2);
        }

        /* === BUTTON === */
        .btn-send {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 4px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 25px rgba(255, 50, 50, 0.15);
        }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(255, 50, 50, 0.25);
        }
        .btn-send:active {
            transform: scale(0.97);
        }

        /* === STATUS & LOG === */
        .status-area {
            margin-top: 14px;
            font-size: 13px;
            color: #7a8aa8;
            min-height: 22px;
            text-align: center;
            transition: 0.2s;
        }
        .status-area.error { color: #ff6b6b; }
        .status-area.success { color: #ff4444; }

        .log-box {
            margin-top: 14px;
            font-size: 12px;
            color: #9aabca;
            background: rgba(0,0,0,0.35);
            padding: 12px 14px;
            border-radius: 14px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            font-family: 'Courier New', monospace;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: #ff4444; border-radius: 10px; }

        /* === FOOTER === */
        .footer {
            margin-top: 22px;
            font-size: 11px;
            color: #3a4a66;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 16px;
            letter-spacing: 1px;
        }
        .footer span { color: #ff4444; opacity: 0.5; }

        /* === LOGIN TOGGLE === */
        .login-box { margin-bottom: 18px; }
        .hidden { display: none !important; }

        /* === ANIMASI TEXT GLOW === */
        .glow-text {
            animation: glowText 3s ease-in-out infinite;
        }
        @keyframes glowText {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 50, 50, 0.1); }
            50% { text-shadow: 0 0 30px rgba(255, 50, 50, 0.4), 0 0 60px rgba(255, 50, 50, 0.1); }
        }
    </style>
</head>
<body>

<!-- === PARTIKEL === -->
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<!-- === CONTAINER === -->
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="icon-bug glow-text">⛧</div>
        <h1>CRIMSON</h1>
        <div class="sub">⚡ WhatsApp Bug System ⚡</div>
    </div>

    <!-- === LOGIN === -->
    <div id="loginSection">
        <div class="login-box">
            <div class="form-group">
                <label>👤 USERNAME</label>
                <input type="text" id="loginUser" placeholder="Masukkan username" value="admin">
            </div>
            <div class="form-group">
                <label>🔒 PASSWORD</label>
                <input type="password" id="loginPass" placeholder="Masukkan password" value="1234">
            </div>
            <button class="btn-send" id="loginBtn">🔑 LOGIN</button>
            <div class="status-area" id="loginStatus">⏳ Masukkan kredensial</div>
        </div>
    </div>

    <!-- === BUG FORM === -->
    <div id="bugSection" class="hidden">

        <div class="mode-group">
            <button class="mode-btn active" data-mode="delay">🐢 Delay</button>
            <button class="mode-btn" data-mode="crush">⚡ Crush</button>
            <button class="mode-btn" data-mode="forcly">💥 Forcly</button>
        </div>

        <div class="form-group">
            <label>🎯 NOMOR TARGET</label>
            <input type="text" id="target" placeholder="62xxx" value="6281234567890">
        </div>
        <div class="form-group">
            <label>💬 PESAN BUG</label>
            <input type="text" id="message" placeholder="Pesan spam" value="Hallo sayang">
        </div>

        <button class="btn-send" id="sendBtn">🚀 KIRIM BUG</button>

        <div id="status" class="status-area">⏳ Siap mengirim...</div>
        <div id="log" class="log-box"></div>
    </div>

    <div class="footer"><span>✦</span> CRIMSON · Private Bug Tool <span>✦</span></div>
</div>

<script>
    (function() {
        // ===== KREDENSIAL =====
        const VALID_USER = "admin";
        const VALID_PASS = "1234";

        const loginSection = document.getElementById('loginSection');
        const bugSection = document.getElementById('bugSection');
        const loginBtn = document.getElementById('loginBtn');
        const loginStatus = document.getElementById('loginStatus');

        let mode = 'delay';

        // ===== LOGIN =====
        loginBtn.addEventListener('click', function() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (user === VALID_USER && pass === VALID_PASS) {
                loginSection.classList.add('hidden');
                bugSection.classList.remove('hidden');
                loginStatus.textContent = '✅ Login berhasil!';
                loginStatus.className = 'status-area success';
            } else {
                loginStatus.textContent = '❌ Username atau password salah!';
                loginStatus.className = 'status-area error';
            }
        });

        document.getElementById('loginPass').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });
        document.getElementById('loginUser').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });

        // ===== MODE =====
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                mode = this.dataset.mode;
                document.getElementById('status').textContent = '🔄 Mode: ' + mode.toUpperCase();
                document.getElementById('status').className = 'status-area';
            });
        });

        // ===== KIRIM =====
        document.getElementById('sendBtn').addEventListener('click', function() {
            const target = document.getElementById('target').value.trim();
            const message = document.getElementById('message').value.trim();
            const status = document.getElementById('status');
            const log = document.getElementById('log');

            if (!target || target.length < 10) {
                status.textContent = '❌ Nomor tidak valid! (min 10 digit)';
                status.className = 'status-area error';
                return;
            }
            if (!message) {
                status.textContent = '❌ Pesan tidak boleh kosong!';
                status.className = 'status-area error';
                return;
            }

            log.style.display = 'block';
            log.innerHTML = '';
            status.className = 'status-area';
            status.textContent = '⏳ Mengirim bug ' + mode.toUpperCase() + ' ke ' + target + '...';

            let total = 50;
            let delayMs = mode === 'delay' ? 2000 : mode === 'crush' ? 500 : 50;
            let count = 0;

            function kirimPesan() {
                if (count >= total) {
                    status.textContent = '✅ Selesai! ' + total + ' pesan terkirim ke ' + target;
                    status.className = 'status-area success';
                    log.innerHTML += '\n✅ Selesai!';
                    log.scrollTop = log.scrollHeight;
                    return;
                }
                const randomId = Math.floor(Math.random() * 9999);
                log.innerHTML += '[' + (count+1) + '/' + total + '] ' + mode.toUpperCase() + ' → ' + target + ' | ' + message + ' [' + randomId + ']\n';
                log.scrollTop = log.scrollHeight;
                status.textContent = '📤 Mengirim ' + (count+1) + '/' + total + '...';
                count++;
                setTimeout(kirimPesan, delayMs);
            }

            setTimeout(kirimPesan, 400);
        });

        document.getElementById('message').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('sendBtn').click();
        });
        document.getElementById('target').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('sendBtn').click();
        });

    })();
</script>
</body>
</html>
